# deploy.conf — Centralized Deployment Configuration
# Source this file: source /etc/agentless/deploy.conf  (or symlink from scripts/)
# All phase scripts read values from here. Override via environment variables.

# ── Network Topology ──
MANAGEMENT_NET="${MANAGEMENT_NET:-10.0.0.0/24}"
TIER0_NET="${TIER0_NET:-192.168.100.0/24}"
TIER1_NET="${TIER1_NET:-172.16.0.0/16}"
TIER2_NET="${TIER2_NET:-10.0.1.0/24}"

# ── Host IPs ──
OPENSEARCH_HOSTS="${OPENSEARCH_HOSTS:-10.0.0.10:9200,10.0.0.11:9200,10.0.0.12:9200}"
LOGSTASH_HOSTS="${LOGSTASH_HOSTS:-10.0.0.20:5044,10.0.0.21:5044}"
WAZUH_MANAGER="${WAZUH_MANAGER:-10.0.0.30}"
REDIS_HOST="${REDIS_HOST:-10.0.0.40}"
REDIS_PORT="${REDIS_PORT:-6379}"
SURICATA_HOST="${SURICATA_HOST:-10.0.0.50}"

# ── Service Ports ──
SSH_PORT="${SSH_PORT:-22}"
LIBVIRT_TLS_PORT="${LIBVIRT_TLS_PORT:-16509}"
VNC_PORT_RANGE="${VNC_PORT_RANGE:-5900-5910}"
LOGSTASH_BEATS_PORT="${LOGSTASH_BEATS_PORT:-5044}"
OPENSEARCH_API_PORT="${OPENSEARCH_API_PORT:-9200}"
WAZUH_AGENT_PORT="${WAZUH_AGENT_PORT:-1514}"
WAZUH_CLUSTER_PORT="${WAZUH_CLUSTER_PORT:-1515}"

# ── Tier 0 Requirements ──
MIN_MEMORY_GB="${MIN_MEMORY_GB:-32}"
MIN_ROOT_DISK_GB="${MIN_ROOT_DISK_GB:-100}"
KVMI_SUPPORTED_KERNELS="${KVMI_SUPPORTED_KERNELS:-5.4 5.10 5.15 6.1}"

# ── DRAKVUF ──
DRAKVUF_BIN="${DRAKVUF_BIN:-/usr/local/bin/drakvuf}"
DRAKVUF_CONFIG_DIR="${DRAKVUF_CONFIG_DIR:-/etc/drakvuf}"
DRAKVUF_LOG_DIR="${DRAKVUF_LOG_DIR:-/var/log/drakvuf}"
DRAKVUF_SYMBOL_DIR="${DRAKVUF_SYMBOL_DIR:-/var/lib/drakvuf/symbols}"
DRAKVUF_STATE_DIR="${DRAKVUF_STATE_DIR:-/var/lib/drakvuf/state-backups}"
DRAKVUF_MEMORY_MAX="${DRAKVUF_MEMORY_MAX:-4G}"
DRAKVUF_MEMORY_SWAP_MAX="${DRAKVUF_MEMORY_SWAP_MAX:-1G}"
DRAKVUF_CPU_QUOTA="${DRAKVUF_CPU_QUOTA:-50%}"
DRAKVUF_JITTER_MIN_US="${DRAKVUF_JITTER_MIN_US:-50}"
DRAKVUF_JITTER_MAX_US="${DRAKVUF_JITTER_MAX_US:-500}"

# ── Suricata ──
SURICATA_MIRROR_INTERFACE="${SURICATA_MIRROR_INTERFACE:-bond0.100}"
SURICATA_CLUSTER_ID="${SURICATA_CLUSTER_ID:-99}"
SURICATA_LOG_DIR="${SURICATA_LOG_DIR:-/var/log/suricata}"

# ── Redis ──
REDIS_MAXMEMORY="${REDIS_MAXMEMORY:-10gb}"
REDIS_AUTH_PASSWORD="${REDIS_AUTH_PASSWORD:-}"  # empty = no auth (dev); set in production

# ── Logstash ──
LOGSTASH_CONF_DIR="${LOGSTASH_CONF_DIR:-/etc/logstash/conf.d}"
LOGSTASH_REDIS_BATCH="${LOGSTASH_REDIS_BATCH:-500}"
LOGSTASH_REDIS_KEY="${LOGSTASH_REDIS_KEY:-drakvuf-queue}"

# ── Risk Scanner ──
RISK_OUTPUT_DIR="${RISK_OUTPUT_DIR:-/var/log/risk-scanner}"
RISK_CRON_SCHEDULE="${RISK_CRON_SCHEDULE:-0 2 * * *}"
RISK_CVE_SCHEDULE="${RISK_CVE_SCHEDULE:-0 3 * * 0}"

# ── Health Check ──
HEALTHCHECK_STALENESS_SEC="${HEALTHCHECK_STALENESS_SEC:-600}"
HEALTHCHECK_ROOT_DISK_THRESHOLD="${HEALTHCHECK_ROOT_DISK_THRESHOLD:-85}"

# ── Syscall Whitelist ──
SYSCALL_WHITELIST="${SYSCALL_WHITELIST:-execve execveat fork clone clone3 init_module finit_module delete_module connect bind socket ptrace process_vm_writev process_vm_readv open creat unlink rename write}"
