---
# Global variables for all tiers
# Mirrors the structure of scripts/deploy.conf

# Network topology
management_net: "10.0.0.0/24"
tier0_net: "192.168.100.0/24"
tier1_net: "172.16.0.0/16"
tier2_net: "10.0.1.0/24"

# Host addresses
opensearch_hosts: "10.0.0.10:9200,10.0.0.11:9200"
logstash_hosts: "10.0.0.20:5044,10.0.0.21:5044"
wazuh_manager: "10.0.0.30"
redis_host: "10.0.0.40"
redis_port: 6379

# Service ports
ssh_port: 22
libvirt_tls_port: 16509
vnc_port_range: "5900-5910"
logstash_beats_port: 5044
opensearch_api_port: 9200

# Paths
drakvuf_bin: "/usr/local/bin/drakvuf"
drakvuf_config_dir: "/etc/drakvuf"
drakvuf_log_dir: "/var/log/drakvuf"
drakvuf_symbol_dir: "/var/lib/drakvuf/symbols"
drakvuf_state_dir: "/var/lib/drakvuf/state-backups"

# Risk scanner
risk_output_dir: "/var/log/risk-scanner"
risk_cron_schedule: "0 2 * * *"
