# Agentless Monitoring — Ansible Inventory
# Usage: ansible-playbook -i inventory/hosts.ini site.yml --limit tier0

[management]
mgmt-01 ansible_host=10.0.0.10
mgmt-02 ansible_host=10.0.0.11

[tier0]
# DRAKVUF + NIDS hosts (Intel Xeon Skylake+, Altp2m)
host-01 ansible_host=192.168.100.1
host-02 ansible_host=192.168.100.2  # standby/HA

[tier1]
# Internal service VMs (Wazuh Agent + Osquery + Auditd)
vm-srv-web-01 ansible_host=172.16.0.10
vm-srv-api-01 ansible_host=172.16.0.11
vm-srv-db-01  ansible_host=172.16.0.12

[tier2]
# Bare metal hosts (Wazuh Agent + Osquery + Auditd + AIDE)
bm-host-01 ansible_host=10.0.1.10
bm-host-02 ansible_host=10.0.1.11

[tier3]
# Dev/test hosts (lightweight Wazuh + Rsyslog)
dev-host-01 ansible_host=10.0.2.10
dev-host-02 ansible_host=10.0.2.11

[wazuh_manager]
mgmt-01

[opensearch]
mgmt-0[1:2]

[logstash]
mgmt-0[1:2]
