# ── 04-risk-scanner.conf — Risk Scanner Logstash Pipeline ──
# Place in /etc/logstash/conf.d/ on the Logstash server

filter {
  if [log_type] == "risk_scan" or [event][kind] == "risk_assessment" {
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }

    mutate {
      rename => {
        "host" => "[host][name]"
        "tier" => "[labels][tier]"
        "overall_risk" => "[risk][overall]"
        "severity" => "[risk][severity]"
      }
      convert => { "[risk][overall]" => "float" }
      copy => { "@timestamp" => "[event][created]" }
      add_field => { "[event][kind]" => "risk_assessment" }
    }

    # Break categories into separate fields for easier dashboarding
    if [categories] {
      ruby {
        code => '
          categories = event.get("[categories]")
          if categories.is_a?(Hash)
            categories.each do |name, data|
              if data.is_a?(Hash)
                data.each do |k, v|
                  event.set("[risk][#{name}][#{k}]", v)
                end
              end
            end
          end
        '
      }
    }
  }
}

output {
  if [log_type] == "risk_scan" or [event][kind] == "risk_assessment" {
    opensearch {
      hosts => ["http://opensearch:9200"]
      index => "risk-scores-%{+YYYY.MM.dd}"
      document_id => "%{[host][name]}-%{[@timestamp]}"
      action => "index"
      ssl => false
    }
  }
}
