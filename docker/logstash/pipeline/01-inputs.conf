input {
  # Filebeat input (production equivalent)
  beats {
    port => 5044
    client_inactivity_timeout => 300
  }

  # Dev: read generated test logs
  file {
    path => "/var/log/agentless/drakvuf-test.json"
    type => "drakvuf"
    codec => json
    start_position => "beginning"
    sincedb_path => "/dev/null"
  }

  file {
    path => "/var/log/agentless/suricata-test.json"
    type => "suricata"
    codec => json
    start_position => "beginning"
    sincedb_path => "/dev/null"
  }
}
