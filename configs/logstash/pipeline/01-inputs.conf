# Logstash Inputs — receive logs from Filebeat + Redis + Syslog
input {
  beats {
    port => 5044
    client_inactivity_timeout => 300
  }

  redis {
    data_type => "list"
    key => "drakvuf-queue"
    host => "10.0.0.40"
    port => 6379
    password => "${REDIS_PASSWORD}"
    batch_count => 500
    codec => json
    threads => 4
  }

  syslog {
    port => 5514
    type => "syslog"
  }
}
