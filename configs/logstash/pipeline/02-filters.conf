# Logstash Filters — ECS normalization + PII sanitization
filter {
  # ---- DRAKVUF VMI events ----
  if [log_type] == "drakvuf" {
    mutate {
      rename => {
        "TimeStamp" => "@timestamp"
        "VMName" => "[host][name]"
        "ProcessId" => "[process][pid]"
        "ParentProcessId" => "[process][parent][pid]"
        "Image" => "[process][executable]"
        "CommandLine" => "[process][command_line]"
        "EventId" => "[event][code]"
      }
    }

    if [event][code] == 1 {
      mutate { add_field => { "[event][category]" => "process" "[event][type]" => "start" } }
    } else if [event][code] == 8 {
      mutate { add_field => { "[event][category]" => "process" "[event][type]" => "info" } }
    } else if [event][code] == 11 {
      mutate { add_field => { "[event][category]" => "file" "[event][type]" => "creation" } }
    }

    # Sanitize PII (passwords in command line)
    mutate {
      gsub => [
        "[process][command_line]", "(-p\\s+|password=)\\S+", "\\1[REDACTED]"
      ]
      remove_field => ["[process][environment]"]
    }

    date { match => ["@timestamp", "ISO8601"] }
  }

  # ---- Suricata NIDS events ----
  if [log_type] == "suricata" {
    mutate {
      rename => {
        "[src_ip]" => "[source][ip]"
        "[src_port]" => "[source][port]"
        "[dest_ip]" => "[destination][ip]"
        "[dest_port]" => "[destination][port]"
        "[proto]" => "[network][protocol]"
        "[alert][signature]" => "[event][reason]"
        "[alert][severity]" => "[event][severity]"
      }
      add_field => { "[event][category]" => "network" }
    }
  }

  # ---- Wazuh alerts ----
  if [log_type] == "wazuh" {
    mutate {
      rename => {
        "[agent][name]" => "[host][name]"
        "[rule][id]" => "[event][code]"
        "[rule][description]" => "[event][reason]"
        "[rule][level]" => "[event][severity]"
      }
    }
  }

  # ---- Syslog events (Tier 3) ----
  if [type] == "syslog" {
    grok {
      match => { "message" => "<%{POSINT:priority}>%{SYSLOGTIMESTAMP:syslog_timestamp} %{SYSLOGHOST:hostname} %{DATA:syslogtag} %{GREEDYDATA:message}" }
      overwrite => [ "message" ]
    }
    date { match => [ "syslog_timestamp", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss" ] }
  }

  # ---- Common enrichment ----
  # Tier classification by hostname pattern
  if [host][name] {
    if [host][name] =~ /^prd-/ {
      mutate { add_field => { "[labels][tier]" => "tier0" } }
    } else if [host][name] =~ /^srv-/ {
      mutate { add_field => { "[labels][tier]" => "tier1" } }
    } else if [host][name] =~ /^bm-/ {
      mutate { add_field => { "[labels][tier]" => "tier2" } }
    } else if [host][name] =~ /^dev-/ {
      mutate { add_field => { "[labels][tier]" => "tier3" } }
    }
  }

  # Correlation hash (dedup key)
  fingerprint {
    source => ["[host][name]", "[process][pid]", "@timestamp"]
    target => "[event][hash]"
    method => "SHA256"
  }
}
