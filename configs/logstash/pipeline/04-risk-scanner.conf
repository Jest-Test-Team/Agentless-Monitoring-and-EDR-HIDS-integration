# Logstash Risk Scanner Pipeline
filter {
  if [log_type] == "risk_scan" {
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }

    mutate {
      rename => {
        "host" => "[host][name]"
        "tier" => "[labels][tier]"
      }
      convert => { "[overall_risk]" => "float" }
    }
  }
}

output {
  if [log_type] == "risk_scan" {
    elasticsearch {
      hosts => ["localhost:9200"]
      index => "risk-scores-%{+YYYY.MM.dd}"
      document_id => "%{[host][name]}-%{[timestamp]}"
    }
  }
}
