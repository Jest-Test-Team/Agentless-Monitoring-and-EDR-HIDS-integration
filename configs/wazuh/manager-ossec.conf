<!-- Wazuh Manager — Logstash Integration Configuration -->
<!-- Append to /var/ossec/etc/ossec.conf on the Wazuh Manager server -->
<ossec_config>
  <integration>
    <name>logstash</name>
    <hook_url>http://LOGSTASH_HOST:LOGSTASH_PORT</hook_url>
    <rule_id>100000,100001</rule_id>
    <alert_format>json</alert_format>
  </integration>
</ossec_config>
