# Redis configuration — Tier 1 buffer
bind 172.16.0.0  # bind to internal network only
port 6379
daemonize no
supervised systemd
loglevel notice
logfile /var/log/redis/redis-tier1.log

requirepass ${REDIS_AUTH_PASSWORD}

# Memory management (2GB max for Tier 1)
maxmemory 2gb
maxmemory-policy allkeys-lru
maxmemory-samples 10

# Persistence
save 3600 1
save 300 100

# Performance
timeout 0
tcp-keepalive 300
databases 8
