# Redis configuration — Tier 0 buffer (Kafka alternative)
bind 0.0.0.0
port 6379
daemonize no
supervised systemd
loglevel notice
logfile /var/log/redis/redis-tier0.log

# Security (set in production)
# requirepass <strong-password>

# Memory management (10GB max, LRU eviction)
maxmemory 10gb
maxmemory-policy allkeys-lru
maxmemory-samples 10

# Persistence
save 3600 1
save 300 100
save 60 1000

# Performance
timeout 0
tcp-keepalive 300
databases 16
