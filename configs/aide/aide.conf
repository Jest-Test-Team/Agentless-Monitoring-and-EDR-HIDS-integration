# AIDE Configuration — Tier 2 File Integrity Monitoring
# Deploy: cp aide.conf /etc/aide.conf && aide --init && cp /var/lib/aide/aide.db.new.gz /var/lib/aide/aide.db.gz
# Verify: aide --check

# Database location
database=file:/var/lib/aide/aide.db.gz
database_out=file:/var/lib/aide/aide.db.new.gz
gzip_dbdir=yes
verbose=5
report_url=file:/var/log/aide/aide.log

# System binaries (monitor permissions, hash, size, inode)
/bin    CONTENT_EX
/sbin    CONTENT_EX
/usr/bin    CONTENT_EX
/usr/sbin    CONTENT_EX
/usr/local/bin    CONTENT_EX
/usr/local/sbin    CONTENT_EX

# Libraries
/lib    CONTENT_EX
/lib64    CONTENT_EX
/usr/lib    CONTENT_EX
/usr/lib64    CONTENT_EX

# Configuration
/etc    CONTENT_EX
/etc/ssh    CONTENT_EX
/etc/audit    CONTENT_EX
/etc/osquery    CONTENT_EX
/etc/aide.conf    CONTENT_EX

# Kernel
/boot    CONTENT_EX

# Root home
/root    CONTENT_EX

# Wazuh agent
/var/ossec    CONTENT_EX

# Exclusions (frequent-changes, temp, system runtime)
!/var/log
!/var/tmp
!/tmp
!/proc
!/sys
!/dev
!/run
!/mnt
!/media
!/var/spool
!/var/cache
# SELinux policy store (frequently regenerated)
!/etc/selinux/targeted
# Python cache
!/usr/lib/python*
# NPM/Pip cache
!/root/.cache
!/root/.npm
