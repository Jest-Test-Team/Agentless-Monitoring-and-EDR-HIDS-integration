# Promtail configuration (Grafana Loki alternative)
# For infrastructure monitoring alongside the ELK/OpenSearch pipeline
# Deploy: /etc/promtail/promtail.yml

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /var/log/promtail/positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: drakvuf
    static_configs:
      - targets: [localhost]
        labels:
          job: drakvuf
          __path__: /var/log/drakvuf/*.json

  - job_name: suricata
    static_configs:
      - targets: [localhost]
        labels:
          job: suricata
          __path__: /var/log/suricata/eve.json

  - job_name: system
    static_configs:
      - targets: [localhost]
        labels:
          job: system
          __path__: /var/log/messages

  - job_name: audit
    static_configs:
      - targets: [localhost]
        labels:
          job: audit
          __path__: /var/log/audit/audit.log
