# Rsyslog direct shipping to Logstash (Tier 3)
# Deploy to /etc/rsyslog.d/90-logstash.conf on each Tier 3 host
# Ensures dev/test logs reach the central SIEM without Wazuh Manager dependency

template(name="LS_template" type="list") {
    constant(value="<")
    property(name="pri")
    constant(value=">")
    property(name="timestamp" dateFormat="rfc3339")
    constant(value=" ")
    property(name="hostname")
    constant(value=" ")
    property(name="syslogtag" position.from="1" position.to="32")
    constant(value=" ")
    property(name="msg" spifno1stsp="on")
    constant(value="\n")
}

*.* action(
    type="omfwd"
    target="LOGSTASH_HOST_PLACEHOLDER"
    port="LOGSTASH_PORT_PLACEHOLDER"
    protocol="tcp"
    template="LS_template"
    TCP_Framing="octet-counted"
    action.resumeRetryCount="3"
    queue.type="linkedList"
    queue.size="50000"
)
