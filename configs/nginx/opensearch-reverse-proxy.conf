# Nginx reverse proxy for OpenSearch Dashboards
# Provides TLS termination + authentication + rate limiting
# Deploy: /etc/nginx/conf.d/opensearch-dashboards.conf

server {
    listen 443 ssl http2;
    server_name dashboards.agentless.example.com;

    ssl_certificate /etc/nginx/certs/opensearch.crt;
    ssl_certificate_key /etc/nginx/certs/opensearch.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=osapi:10m rate=10r/s;
    limit_req zone=osapi burst=20 nodelay;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # OpenSearch Dashboards (port 5601)
    location / {
        proxy_pass http://localhost:5601;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OpenSearch API (port 9200) — read-only for dashboards
    location /api/ {
        proxy_pass http://localhost:9200;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        limit_req zone=osapi;
    }

    access_log /var/log/nginx/opensearch-access.log;
    error_log /var/log/nginx/opensearch-error.log;
}

# HTTP redirect to HTTPS
server {
    listen 80;
    server_name dashboards.agentless.example.com;
    return 301 https://$host$request_uri;
}
